name: CI/CD MLflow Pipeline

on:
  push:
    paths:
      - 'MLProject/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-train-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: '3.12'

      - name: Install MLflow & Dependencies
        run: pip install mlflow pandas scikit-learn

      - name: Run MLflow Project (Training)
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Commit Artifacts to GitHub (Skilled Criteria)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add MLProject/saved_model/
          if git diff --staged --quiet; then
            echo "Tidak ada artefak baru untuk di-commit."
          else
            git commit -m "Auto-save model artifacts to GitHub Repo"
            git push
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image (Advance Criteria)
        run: |
          cd MLProject
          mlflow models build-docker -m saved_model -n ${{ secrets.DOCKERHUB_USERNAME }}/stroke-risk-model:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/stroke-risk-model:latest